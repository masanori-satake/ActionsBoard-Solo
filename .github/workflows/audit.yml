name: "監査: 透明性とセキュリティ (Audit: Transparency and Security)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'projects/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  integrity:
    name: コード整合性とセキュリティ監査 (Code Integrity and Security Audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: バージョンの一貫性確認 (Version Consistency)
        run: python3 scripts/check_version.py

  vulnerability-scan:
    name: 脆弱性検査 (Vulnerability Scan)
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v1.9.1
    with:
      scan-args: |-
        --recursive
        ./projects
        ./package.json
