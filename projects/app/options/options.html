<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Settings - ActionsBoard-Solo</title>
    <link rel="stylesheet" href="../lib/material3.css" />
    <style>
      body {
        margin: 0;
        background-color: var(--md-sys-color-background);
        color: var(--md-sys-color-on-background);
        font-family: var(--font-family);
        display: flex;
        justify-content: center;
      }
      .container {
        max-width: 800px;
        width: 100%;
        padding: var(--md-sys-spacing-4);
      }
      header {
        margin-bottom: var(--md-sys-spacing-4);
      }
      #error-msg {
        color: var(--md-sys-color-error);
        font-weight: bold;
        margin-bottom: var(--md-sys-spacing-2);
        display: none;
      }
      section {
        background-color: var(--md-sys-color-surface-container-low);
        padding: var(--md-sys-spacing-3);
        border-radius: var(--md-sys-shape-large);
        margin-bottom: var(--md-sys-spacing-4);
      }
      h2 {
        margin-top: 0;
        margin-bottom: var(--md-sys-spacing-2);
        color: var(--md-sys-color-primary);
        display: flex;
        align-items: center;
        gap: var(--md-sys-spacing-1);
      }
      h2 .material-symbols-outlined {
        font-size: 28px;
      }
      .field {
        margin-bottom: var(--md-sys-spacing-3);
        display: flex;
        flex-direction: column;
      }
      .field label {
        margin-bottom: var(--md-sys-spacing-1);
        font-weight: var(--md-sys-typescale-label-large-weight);
        font-size: var(--md-sys-typescale-label-large-size);
      }
      input[type='text'],
      input[type='password'],
      textarea,
      select {
        padding: var(--md-sys-spacing-1-5) var(--md-sys-spacing-2);
        border-radius: var(--md-sys-shape-extra-small);
        border: 1px solid var(--md-sys-color-outline);
        background-color: var(--md-sys-color-surface);
        color: var(--md-sys-color-on-surface);
        font-size: var(--md-sys-typescale-body-large-size);
      }
      input:focus {
        outline: 2px solid var(--md-sys-color-primary);
        border-color: transparent;
      }
      input:disabled {
        background-color: var(--md-sys-color-surface-variant) !important;
        color: var(--md-sys-color-on-surface-variant) !important;
        cursor: not-allowed;
        opacity: 0.7;
      }
      .button-row {
        display: flex;
        gap: var(--md-sys-spacing-2);
        margin-top: var(--md-sys-spacing-2);
      }
      button {
        padding: var(--md-sys-spacing-1-5) var(--md-sys-spacing-3);
        border-radius: var(--md-sys-shape-full);
        border: none;
        font-weight: var(--md-sys-typescale-label-large-weight);
        cursor: pointer;
        transition:
          background-color 0.2s,
          box-shadow 0.2s;
      }
      .btn-primary {
        background-color: var(--md-sys-color-primary);
        color: var(--md-sys-color-on-primary);
      }
      .btn-primary:hover {
        box-shadow: var(--md-sys-elevation-1);
      }
      .btn-secondary {
        background-color: var(--md-sys-color-secondary-container);
        color: var(--md-sys-color-on-secondary-container);
      }
      .btn-outline {
        background-color: transparent;
        border: 1px solid var(--md-sys-color-outline);
        color: var(--md-sys-color-primary);
      }
      .btn-error {
        color: var(--md-sys-color-error);
      }
      .btn-error-filled {
        background-color: var(--md-sys-color-error);
        color: var(--md-sys-color-on-error);
      }
      .btn-error-filled:hover {
        box-shadow: var(--md-sys-elevation-1);
        opacity: 0.9;
      }

      .btn-icon-m3 {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--md-sys-color-on-surface-variant);
        padding: 8px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.2s;
      }
      .btn-icon-m3:hover {
        background-color: var(--md-sys-color-surface-variant);
      }
      .btn-icon-m3.btn-error {
        color: var(--md-sys-color-error);
      }
      .btn-icon-m3.btn-error:hover {
        background-color: var(--md-sys-color-error-container);
        color: var(--md-sys-color-on-error-container);
      }

      /* Auth Config List Styles */
      .auth-card {
        background-color: var(--md-sys-color-surface-container);
        padding: var(--md-sys-spacing-2);
        border-radius: var(--md-sys-shape-medium);
        margin-bottom: var(--md-sys-spacing-2);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* Workspace List Styles */
      .workspace-card {
        background-color: var(--md-sys-color-surface-container);
        padding: var(--md-sys-spacing-2);
        border-radius: var(--md-sys-shape-medium);
        margin-bottom: var(--md-sys-spacing-2);
        border: 2px solid transparent;
      }
      .workspace-card.dragging {
        opacity: 0.5;
        border: 2px dashed var(--md-sys-color-outline);
      }
      .workspace-card.drag-over {
        border-top: 4px solid var(--md-sys-color-primary);
      }
      .workspace-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .item-list {
        margin-top: var(--md-sys-spacing-2);
        padding-left: var(--md-sys-spacing-4);
        min-height: 16px;
        border-radius: var(--md-sys-shape-small);
      }
      .item-list.drag-over {
        background-color: var(--md-sys-color-surface-container-high);
        outline: 2px dashed var(--md-sys-color-primary);
      }
      .item-row {
        display: flex;
        gap: var(--md-sys-spacing-1);
        align-items: center;
        margin-bottom: var(--md-sys-spacing-1);
        font-size: var(--md-sys-typescale-body-large-size);
        padding: 4px;
        border-radius: var(--md-sys-shape-small);
        border: 1px solid transparent;
      }
      .item-row.dragging {
        opacity: 0.5;
        background-color: var(--md-sys-color-surface-variant);
      }
      .item-row.drag-over {
        border-top: 2px solid var(--md-sys-color-primary);
      }
      .drag-handle {
        cursor: grab;
        color: var(--md-sys-color-on-surface-variant);
        user-select: none;
      }
      .drag-handle:active {
        cursor: grabbing;
      }
      .item-name,
      .item-repo {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .item-repo {
        font-size: var(--md-sys-typescale-label-large-size);
        color: var(--md-sys-color-on-surface-variant);
      }
      .badge-fav {
        color: #fbc02d; /* Material Yellow */
      }
      .hint {
        font-size: var(--md-sys-typescale-label-large-size);
        color: var(--md-sys-color-on-surface-variant);
        margin-top: var(--md-sys-spacing-0-5);
      }

      /* Toast Notification */
      #toast {
        position: fixed;
        bottom: var(--md-sys-spacing-4);
        left: 50%;
        transform: translateX(-50%);
        background-color: var(--md-sys-color-inverse-surface);
        color: var(--md-sys-color-inverse-on-surface);
        padding: var(--md-sys-spacing-1-5) var(--md-sys-spacing-3);
        border-radius: var(--md-sys-shape-extra-small);
        display: none;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
          <h1 class="md-sys-typescale-headline-large">ActionsBoard-Solo 設定</h1>
          <span id="version-display" class="md-sys-typescale-body-large" style="color: var(--md-sys-color-on-surface-variant);"></span>
        </div>
      </header>

      <main>
        <!-- API Settings -->
        <section id="api-settings">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: var(--md-sys-spacing-2);
            "
          >
            <h2 class="md-sys-typescale-title-large" style="margin-bottom: 0">
              <span class="material-symbols-outlined">account_circle</span>
              アカウント
            </h2>
            <button id="add-auth" class="btn-icon-m3 btn-secondary" data-tooltip="追加">
              <span class="material-symbols-outlined">add</span>
            </button>
          </div>
          <div id="auth-list">
            <!-- Auth configs will be rendered here -->
          </div>
        </section>

        <!-- Notification Settings -->
        <section id="notification-settings">
          <h2 class="md-sys-typescale-title-large">
            <span class="material-symbols-outlined">notifications</span>
            通知設定
          </h2>

          <div class="field">
            <label>通知対象の範囲</label>
            <select id="notif-scope">
              <option value="all">すべて</option>
              <option value="my-activity">My Activityのみ</option>
              <option value="workspaces">特定のワークスペース</option>
            </select>
          </div>

          <div
            id="notif-workspaces-container"
            style="
              display: none;
              margin-left: var(--md-sys-spacing-2);
              margin-bottom: var(--md-sys-spacing-2);
            "
          >
            <label class="md-sys-typescale-label-large">通知するワークスペースを選択:</label>
            <div
              id="notif-workspaces-list"
              style="
                margin-top: var(--md-sys-spacing-1);
                display: flex;
                flex-direction: column;
                gap: 4px;
              "
            >
              <!-- Workspace checkboxes will be rendered here -->
            </div>
          </div>

          <div class="field">
            <label>通知するイベント</label>
            <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 4px">
              <div style="display: flex; align-items: center; gap: 8px">
                <input
                  type="checkbox"
                  id="notif-event-failure"
                  checked
                  style="width: 18px; height: 18px"
                />
                <label for="notif-event-failure" style="margin-bottom: 0">ビルド失敗</label>
              </div>
              <div style="display: flex; align-items: center; gap: 8px">
                <input type="checkbox" id="notif-event-pages" style="width: 18px; height: 18px" />
                <label for="notif-event-pages" style="margin-bottom: 0">Pagesデプロイ</label>
              </div>
            </div>
          </div>
        </section>

        <!-- Workspace Settings -->
        <section id="workspace-settings">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: var(--md-sys-spacing-2);
            "
          >
            <h2 class="md-sys-typescale-title-large" style="margin-bottom: 0">
              <span class="material-symbols-outlined">view_quilt</span>
              ワークスペース
            </h2>
            <div class="button-row" style="margin-top: 0; align-items: center">
              <button
                id="add-workspace-repo"
                class="btn-icon-m3 btn-outline"
                data-tooltip="リポジトリから追加"
              >
                <span class="material-symbols-outlined">account_tree</span>
                <span
                  class="material-symbols-outlined"
                  style="font-size: 18px; margin-left: -8px; margin-top: 8px"
                  >add</span
                >
              </button>
              <button id="add-workspace" class="btn-icon-m3 btn-secondary" data-tooltip="追加">
                <span class="material-symbols-outlined">add</span>
              </button>
            </div>
          </div>
          <div id="workspace-list">
            <!-- Workspaces will be rendered here -->
          </div>
        </section>

        <!-- Advanced Settings (Optional) -->
        <section id="other-settings">
          <h2 class="md-sys-typescale-title-large">
            <span class="material-symbols-outlined">settings</span>
            設定
          </h2>
          <div class="button-row">
            <button id="export-config" class="btn-outline">エクスポート</button>
            <button id="import-config" class="btn-outline">インポート</button>
            <button id="reset-config" class="btn-error-filled">全設定を初期化</button>
          </div>
          <div class="hint" style="margin-top: var(--md-sys-spacing-2)">
            ※ セキュリティのため、個人アクセストークン（PAT）はエクスポートに含まれません。
          </div>
        </section>
      </main>

      <div id="toast"></div>
    </div>

    <!-- Modal for adding/editing workspace or item -->
    <dialog
      id="modal"
      style="
        border: none;
        border-radius: var(--md-sys-shape-large);
        padding: var(--md-sys-spacing-4);
        background-color: var(--md-sys-color-surface-container-high);
        box-shadow: var(--md-sys-elevation-3);
        min-width: 400px;
      "
    >
      <h3 id="modal-title" class="md-sys-typescale-title-large"></h3>
      <div id="error-msg"></div>
      <div id="modal-content"></div>
      <div
        class="button-row"
        style="justify-content: flex-end; margin-top: var(--md-sys-spacing-4)"
      >
        <button id="modal-cancel" class="btn-outline">キャンセル</button>
        <button id="modal-save" class="btn-primary">保存</button>
      </div>
    </dialog>

    <script src="options.js"></script>
  </body>
</html>
